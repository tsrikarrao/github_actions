name: 06 - Context
run-name: 06 - Context | Debug - ${{ inputs.debug }} ${{ github.workflow }} - ${{ github.run_number }}
on:
  push:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode'
        type: boolean
        default: false

env:
  WORKFLOW_VAR: "This is a workflow-level variable"
  OVERRIDE_VAR: "This is a workflow-level variable"
jobs:
  echo-data:
    env:
      WORKFLOW_VAR: "This is a workflow-level variable 2"
      OVERRIDE_VAR: "This is a workflow-level variable 2"
    runs-on: ubuntu-latest
    steps:
      - name: Display Information from Github Context
        run: |
          echo "Event Name: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Job: ${{ github.job }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Workflow Run ID: ${{ github.run_id }}"
          echo "Workflow Run Number: ${{ github.run_number }}"
          echo "Event Action: ${{ github.event.action }}"

      - name: Variable Values
        run: |
          echo "Variable values:: ${{ vars.MY_VAR }}"

      - name: Override Variable Values 1
        run: |
          echo "Override variable values:: ${{ env.OVERRIDE_VAR }}"
          echo "Workflow variable values:: ${{ env.WORKFLOW_VAR }}"

      - name: Override Variable Values 2
        run: |
          echo "Override variable values:: ${{ env.OVERRIDE_VAR }}"
          echo "Workflow variable values:: ${{ env.WORKFLOW_VAR }}"

      - name: Override Variable Values 3
        env:
          OVERRIDE_VAR: "This is a step-level variable 3"
          WORKFLOW_VAR: "This is a step-level variable 3"
        run: |
          echo "Override variable values:: ${{ env.OVERRIDE_VAR }}"
          echo "Workflow variable values:: ${{ env.WORKFLOW_VAR }}"
  echo-vars:
    runs-on: ubuntu-latest
    needs: echo-data
    steps:
      - name: Display Information from Vars Context
        run: |
          echo "Vars Context MY_VAR: ${{ vars.MY_VAR }}"
          echo "Vars Context WORKFLOW_VAR: ${{ vars.WORKFLOW_VAR }}"
          echo "Vars Context OVERRIDE_VAR: ${{ vars.OVERRIDE_VAR }}"