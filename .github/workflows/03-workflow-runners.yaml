name: 03 - Workflow Runners

on:
  push:

jobs:
  ubuntu-latest-machine:
    runs-on: ubuntu-latest
    steps:
      - name: Running on ubuntu-latest
        run: |
          echo "I'm running on ubuntu-latest"
          echo "My runner is $RUNNER_NAME"
          echo "My runner is ${{ runner.name }}"
          echo "My runner is $RUNNER_OS"
          echo "My runner is $RUNNER_TEMP"
  windows-echo-machine:
    runs-on: windows-latest
    steps:
      - name: Running on windows-latest
        run: |
          echo "I'm running on windows-latest"
          echo "My runner is %RUNNER_NAME%"
          echo "My runner is $RUNNER_NAME"
          echo "My runner is ${{ runner.name }}"
          echo "My runner is $RUNNER_OS"
          echo "My runner is $RUNNER_TEMP"
  macos-echo-machine:
    runs-on: macos-latest
    steps:
      - name: Running on macos-latest
        run: |
          echo "I'm running on macos-latest"
          echo "My runner is %RUNNER_NAME%"
          echo "My runner is $RUNNER_NAME"
          echo "My runner is ${{ runner.name }}"
          echo "My runner is $RUNNER_OS"
          echo "My runner is $RUNNER_TEMP"
