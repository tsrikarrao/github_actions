name: 01 - Building Block

on:
  push

jobs:
  echo-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello
        run: echo "Hello World!"
  echo-goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: Failed step
        run: |
          echo "This will fail"
          exit 0
      - name: Say goodbye
        run: echo "Good Bye"
